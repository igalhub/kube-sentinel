groups:
  - name: kube-sentinel
    rules:
      - alert: PodCrashLooping
        expr: >
          increase(kube_sentinel_pod_restart_count[5m]) > 5
          or
          kube_sentinel_pod_container_state{state="waiting",reason="CrashLoopBackOff"} == 1
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash-looping"
          description: >
            Container {{ $labels.container }} is in CrashLoopBackOff or has restarted
            more than 5 times in the last 5 minutes.

      - alert: NodeNotReady
        expr: kube_sentinel_node_ready == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Node {{ $labels.node }} is not ready"
          description: "Node {{ $labels.node }} has been not ready for more than 1 minute."

      - alert: NodeMemoryPressure
        expr: kube_sentinel_node_condition{condition="MemoryPressure"} == 1
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Node {{ $labels.node }} is under memory pressure"
          description: "Node {{ $labels.node }} is evicting pods to reclaim memory."

      - alert: DeploymentUnavailable
        expr: kube_sentinel_deployment_replicas_unavailable > 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} has unavailable replicas"
          description: "{{ $value }} replicas have been unavailable for more than 2 minutes."

      - alert: NodeCPUSaturation
        expr: >
          (kube_sentinel_node_requested_cpu_cores / kube_sentinel_node_allocatable_cpu_cores) * 100 > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Node {{ $labels.node }} is CPU saturated"
          description: "Node {{ $labels.node }} has had requested CPU above 90% of allocatable for more than 5 minutes."

      - alert: NodeMemorySaturation
        expr: >
          (kube_sentinel_node_requested_memory_bytes / kube_sentinel_node_allocatable_memory_bytes) * 100 > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Node {{ $labels.node }} is memory saturated"
          description: "Node {{ $labels.node }} has had requested memory above 90% of allocatable for more than 5 minutes."
